[include ../extruders/wwbmg.cfg]
[include ../probes/beacon.cfg]
[include ../hotends/tk.cfg]

[beacon]
x_offset: 0 # update with offset from nozzle on your machine
y_offset: 20.6 # update with offset from nozzle on your machine

#---------------------------------------------------- X -----------------------------------------------------
# The A motor in the CoreXY system located on the right side of the printer
#------------------------------------------------------------------------------------------------------------
[stepper_x]
position_min: 0
position_max: 305
position_endstop: 305
homing_speed: 120

#---------------------------------------------------- Y -----------------------------------------------------
# The B motor in the CoreXY system located on the left side of the printer
#------------------------------------------------------------------------------------------------------------
[stepper_y]
position_min: 0
position_max: 308
position_endstop: 308
homing_speed: 80

[quad_gantry_level]
points:
   8,0
   8,260
   285,260
   285,0

# Part cooling fan
[fan]
pin: PD15
hardware_pwm: False
kick_start_time: 0.100

[neopixel nozzle_led]
pin: toolboard_t0:PD3
chain_count: 3                  # 3 = Stealthburner (1 logo + 2 nozzle). Change to match your strip.
color_order: GRBW                # WS2812B = GRB. SK6812 RGBW = GRBW. Test: send pure RED; if you get green, order is wrong.
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 0.0