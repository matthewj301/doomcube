# Thermal-runaway protection (explicit + tuned).
# Klipper auto-creates a verify_heater for every heater using defaults; these
# blocks override those defaults with values matched to this machine's heaters.
# A heater is faulted (printer shut down) if it can't gain heating_gain degrees
# within check_gain_time while below target, or drifts > max_error from target.

[verify_heater extruder]
max_error: 120
check_gain_time: 20      # high-watt hotend ramps fast; default is fine
hysteresis: 5
heating_gain: 2

[verify_heater heater_bed]
max_error: 200           # large bed: allow more drift (lid opens, draft) before faulting
check_gain_time: 90      # 300mm bed to 105C heats slowly; raise from the 60s default to avoid false trips
hysteresis: 8
heating_gain: 2
