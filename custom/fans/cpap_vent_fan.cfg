# Chamber ventilation fan (CPAP blower)
# Exhausts chamber heat using the existing chamber thermistor as input
# temperature_combined sensor doesn't reliably initialize the target on boot,
# so _INIT_CPAP_EXHAUST forces it after startup.
[delayed_gcode _INIT_CPAP_EXHAUST]
initial_duration: 2
gcode:
  SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=cpap_chamber_ventilation TARGET=50

[temperature_fan cpap_chamber_ventilation]
pin: PA8
max_power: 0.8
shutdown_speed: 0
cycle_time: 0.005
hardware_pwm: False
kick_start_time: 0.100
off_below: 0.1

sensor_type: temperature_combined
sensor_list: temperature_sensor chamber
combination_method: max
maximum_deviation: 999.9

control: watermark
max_delta: 1.0
min_temp: 10
max_temp: 80
target_temp: 45
