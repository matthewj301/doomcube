[motor_constants bondtech-36h020h-1004a-001]
# Bondtech LGX Lite Pro motor (36mm) https://www.bondtech.se/downloads/TDS/Bondtech-13013A-classH-36H020H-1004A-001.pdf?srsltid=AfmBOoo4qqMmfeIV0JUmBfohUlgZpRCy8FLHqFx-9bZLsHoDCtXYTudq
resistance: 2.37
inductance: 0.0012 
holding_torque: 0.0883
max_current: 1
steps_per_revolution: 200

[autotune_tmc stepper_x]
motor: ldo-42sth48-2804ah
tuning_goal: performance
voltage: ${constants.xy_bus_voltage}
sgt: 2
overvoltage_vth: 58

[autotune_tmc stepper_y]
motor: ${autotune_tmc stepper_x.motor}
tuning_goal: ${autotune_tmc stepper_x.tuning_goal}
voltage: ${autotune_tmc stepper_x.voltage}
sgt: ${autotune_tmc stepper_x.sgt}
overvoltage_vth: ${autotune_tmc stepper_x.overvoltage_vth}

[autotune_tmc stepper_z]
motor: ldo-42sth48-2004ac
tuning_goal: silent
voltage: ${constants.z_bus_voltage}

[autotune_tmc stepper_z1]
motor: ${autotune_tmc stepper_z.motor}
tuning_goal: ${autotune_tmc stepper_z.tuning_goal}
voltage: ${autotune_tmc stepper_z.voltage}

[autotune_tmc stepper_z2]
motor: ${autotune_tmc stepper_z.motor}
tuning_goal: ${autotune_tmc stepper_z.tuning_goal}
voltage: ${autotune_tmc stepper_z.voltage}

[autotune_tmc stepper_z3]
motor: ${autotune_tmc stepper_z.motor}
tuning_goal: ${autotune_tmc stepper_z.tuning_goal}
voltage: ${autotune_tmc stepper_z.voltage}