[gcode_macro TA_CHAMBER_HEAT]
description: Toolhead-assisted chamber heating with mixing patterns until target reached
gcode: !!include ../python/chamber_heating.py

[gcode_macro TA_CHAMBER_STOP]
gcode:
  SET_GCODE_VARIABLE MACRO=TA_CHAMBER_STATE VARIABLE=stop VALUE=1

[gcode_macro TA_CHAMBER_STATE]
description: Internal state holder for chamber heating stop flag
variable_stop: 0
gcode:
  !respond_info(f"stop={own_vars.stop}")
