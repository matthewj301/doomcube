[gcode_macro POOP_PURGE]
description: Purge filament at poop chute location (replaces AFC poop macro for HH)
gcode:
    {% set vars = printer["gcode_macro _PRINTER_VARS"] %}
    {% set travel_speed = (vars.travel_speed|float * 60)|int %}
    {% set travel_accel = vars.travel_accel|float %}
    {% set saved_accel = printer.toolhead.max_accel %}

    {% set purge_loc_x = 280 %}
    {% set purge_loc_y = 300 %}
    {% set purge_spd = (20 * 60)|int %}
    {% set purge_start_z = 0.4 %}
    {% set z_lift = 10 %}
    {% set fast_z = (200 * 60)|int %}
    {% set cool_time = 2 %}
    {% set fan_speed = 0.4 %}
    {% set max_iter_length = 40 %}
    {% set iter_z_raise = 6 %}
    {% set iter_z_change = 0.6 %}
    {% set max_iters = 3 %}
    {% set purge_min = 61.0 %}

    {% set purge_len = params.PURGE_LENGTH|default(printer.mmu.toolchange_purge_volume|default(72))|float %}
    {% set purge_len = [purge_len, purge_min]|max %}

    {% set ns = namespace(remaining=purge_len, current_z=purge_start_z) %}

    MAYBE_HOME
    G90
    SET_VELOCITY_LIMIT ACCEL={travel_accel}

    G0 X{purge_loc_x} Y{purge_loc_y} F{travel_speed}
    G0 Z{purge_start_z} F{fast_z}

    M106 S{(fan_speed * 255)|int}

    {% for i in range(max_iters) %}
        {% if ns.remaining > 0 %}
            {% set step = [ns.remaining, max_iter_length]|min %}
            G92 E0
            G1 E{step} F{purge_spd}
            {% set ns.remaining = ns.remaining - step %}
            {% set ns.current_z = ns.current_z + iter_z_raise %}
            G0 Z{ns.current_z} F{fast_z}
            {% if ns.remaining > 0 %}
                {% set ns.current_z = ns.current_z + iter_z_change %}
                G0 Z{ns.current_z} F{fast_z}
            {% endif %}
        {% endif %}
    {% endfor %}

    G4 P{(cool_time * 1000)|int}
    M106 S0

    G0 Z{ns.current_z + z_lift} F{fast_z}

    SET_VELOCITY_LIMIT ACCEL={saved_accel}

[gcode_macro CLEAN_NOZZLE]
description: Wipe the nozzle on the brush
gcode:
    {% set vars = printer["gcode_macro _PRINTER_VARS"] %}
    {% set travel_speed = (vars.travel_speed|float * 60)|int %}
    {% set travel_accel = vars.travel_accel|float %}
    {% set saved_accel = printer.toolhead.max_accel %}
    {% set brush_speed = (500 * 60)|int %}
    {% set brush_x_start = 83 %}
    {% set brush_x_end = 117 %}
    {% set brush_y = 305 %}
    {% set passes = 4 %}

    MAYBE_HOME
    G90
    SET_VELOCITY_LIMIT ACCEL={travel_accel}
    G0 X{brush_x_start} Y{brush_y} F{travel_speed}
    {% for i in range(passes) %}
        G1 X{brush_x_end} F{brush_speed}
        G1 X{brush_x_start} F{brush_speed}
    {% endfor %}
    SET_VELOCITY_LIMIT ACCEL={saved_accel}
