# Happy Hare slicer g-code templates (paste into Orca/Prusa/SuperSlicer)
#
# Requires the Happy Hare moonraker g-code preprocessor for !referenced_tools! etc.
#
# --- Start G-Code ---
# MMU_START_SETUP INITIAL_TOOL={initial_tool} TOTAL_TOOLCHANGES=!total_toolchanges! REFERENCED_TOOLS=!referenced_tools! TOOL_COLORS=!colors! TOOL_TEMPS=!temperatures! TOOL_MATERIALS=!materials! FILAMENT_NAMES=!filament_names! PURGE_VOLUMES=!purge_volumes!
# MMU_START_CHECK
# PRINT_START BED_TEMP={first_layer_bed_temperature[0]} HOTEND_TEMP={first_layer_temperature[0]} MATERIAL={filament_type[0]} TARGET_CHAMBER_TEMP=0
# MMU_START_LOAD_INITIAL_TOOL
# START_PURGE
# SET_PRINT_STATS_INFO TOTAL_LAYER={total_layer_count}
#
# PrusaSlicer uses {first_layer_bed[0]} / {first_layer_temperature[0]} / {filament_type[0]} instead.
#
# --- End G-Code ---
# PRINT_END
# (MMU_END is called automatically at the start of PRINT_END when Happy Hare is enabled)
#
# --- Tool Change G-Code ---
# T[next_extruder]
#
# --- After Layer Change G-Code ---
# _MMU_UPDATE_HEIGHT
# SET_PRINT_STATS_INFO CURRENT_LAYER={layer_num}

[gcode_macro START_PURGE]
description: Adaptive line purge after initial tool load (KAMP LINE_PURGE with fallback)
gcode:
  {% if printer['gcode'].commands['LINE_PURGE'] %}
    LINE_PURGE
  {% else %}
    _FALLBACK_PURGE
  {% endif %}
